   S(134, "ممنوع الوقوف إلا لحافلات المواصلات", "موقف مخصص لحافلات شركة المواصلات فقط",
   "No Parking Except Mwasalat Buses", "Parking reserved for Mwasalat company buses only",
   "मवासलात बसों को छोड़कर पार्किंग मना", "केवल मवासलात कंपनी की बसों के लिए आरक्षित",
   "مواصلات بسوں کے علاوہ پارکنگ منع", "صرف مواصلات کمپنی کی بسوں کے لیے مختص",
   "মাওয়াসালাত বাস ছাড়া পার্কিং নিষেধ", "শুধুমাত্র মাওয়াসালাত কোম্পানির বাসের জন্য সংরক্ষিত"),
   S(135, "خطوط تحذيرية للدوارات والمنحنيات", "علامة أرضية للتحذير من خطر غير واضح كالدوارات والمنحنيات الخطرة",
   "Warning Lines for Roundabouts and Curves", "Road marking warning of hidden dangers like roundabouts and dangerous curves",
   "गोल चक्करों और मोड़ों के लिए चेतावनी लाइनें", "छिपे खतरों जैसे गोल चक्करों और खतरनाक मोड़ों की चेतावनी",

   "গোলচত্বর এবং বাঁকের জন্য সতর্কতা লাইন", "গোপন বিপদ যেমন গোলচত্বর এবং বিপজ্জনক বাঁকের সতর্কতা"),
   S(136, "ممنوع التجاوز قطعياً", "علامة أرضية تمنع التجاوز بشكل قطعي",
   "Strictly No Overtaking", "Road marking prohibiting all overtaking",
   "ओवरटेकिंग सख्त मना", "सभी ओवरटेकिंग को प्रतिबंधित करने वाला सड़क चिह्न",
   "اوورٹیکنگ سختی سے منع", "تمام اوورٹیکنگ کو منع کرنے والا سڑک کا نشان",
   "ওভারটেক সম্পূর্ণ নিষেধ", "সকল ওভারটেক নিষিদ্ধ করার রাস্তার চিহ্ন"),
   S(137, "الانعطاف مسموح", "علامة أرضية تسمح بالانعطاف",
   "Turning Allowed", "Road marking permitting turns",
   "मोड़ की अनुमति", "मोड़ की अनुमति देने वाला सड़क चिह्न",
   "موڑ کی اجازت", "موڑ کی اجازت دینے والا سڑک کا نشان",
   "বাঁক নেওয়ার অনুমতি", "বাঁক নেওয়ার অনুমতি প্রদানকারী রাস্তার চিহ্ন"),
   S(138, "مسموح التجاوز", "علامة أرضية تسمح بتجاوز المركبات",
   "Overtaking Allowed", "Road marking permitting overtaking",
   "ओवरटेकिंग की अनुमति", "वाहनों को ओवरटेक करने की अनुमति देने वाला सड़क चिह्न",
   "اوورٹیکنگ کی اجازت", "گاڑیوں کو اوورٹیک کرنے کی اجازت دینے والا سڑک کا نشان",
   "ওভারটেকিং অনুমোদিত", "যানবাহন ওভারটেক করার অনুমতি প্রদানকারী রাস্তার চিহ্ন"),

S(139, "ممنوع التجاوز", "علامة أرضية تمنع تجاوز المركبات",
   "No Overtaking", "Road marking prohibiting overtaking",
   "ओवरटेकिंग मना", "वाहनों को ओवरटेक करने से मना करने वाला सड़क चिह्न",
   "اوورٹیکنگ منع", "گاڑیوں کو اوورٹیک کرنے سے منع کرنے والا سڑک کا نشان",
   "ওভারটেকিং নিষেধ", "যানবাহন ওভারটেক করতে নিষেধ করার রাস্তার চিহ্ন"),
            // آمرة 2-0
            S(1,"قف","علامة أمر بالوقوف","Stop","Regulatory stop","रुकें","नियामक","رکیں","لازمی","থামুন","বাধ্যতামূলক"),
            S(2,"أفسح الطريق","علامة أمر بإفساح الطريق","Give Way","Regulatory yield","रास्ता दें","नियामक","راستہ دیں","لازمی","রাস্তা দিন","বাধ্যতামূলক")
        ];

        let currentLang = 'ar';
        let currentTab = 'warning';
        let quizIndex = 0;
        let quizActive = false;

        function buildTabs() {
            const container = document.getElementById('tabsContainer');
            const tabs = translations[currentLang].tabs;
            const keys = ['warning', 'prohibitory', 'mandatory', 'info', 'ground', 'order', 'quiz'];
            container.innerHTML = '';
            tabs.forEach((name, i) => {
                const btn = document.createElement('button');
                btn.className = 'tab' + (keys[i] === currentTab ? ' active' : '');
                btn.innerText = name;
                btn.onclick = () => switchTab(keys[i]);
                container.appendChild(btn);
            });
        }

        function switchTab(tabId) {
            currentTab = tabId;
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
            document.getElementById('sec-' + tabId).classList.add('active');
            buildTabs();
            if (tabId === 'quiz') startQuiz();
        }

        function renderSection(sectionId, startIdx, endIdx) {
            const container = document.getElementById('sec-' + sectionId);
            if (!container) return;
            const idx = ['warning','prohibitory','mandatory','info','ground','order','quiz'].indexOf(sectionId);
            let html = `<h2 style="text-align:center; margin-bottom:15px;">${translations[currentLang].tabs[idx]}</h2><div class="signs-grid">`;
            for (let i = startIdx; i < endIdx; i++) {
                if (i >= allSigns.length) break;
                const s = allSigns[i];
                const d = s[currentLang];
                html += `
                    <div class="sign-card">
                        <img src="${s.img}" alt="${d.t}" onerror="this.style.display='none'">
                        <h3>${d.t}</h3>
                        <p class="desc">${d.d}</p>
                    </div>`;
            }
            html += '</div>';
            container.innerHTML = html;
        }

        function renderAllSections() {
            renderSection('warning', 2, 36);
            renderSection('prohibitory', 36, 61);
            renderSection('mandatory', 61, 73);
            renderSection('info', 73, 95);
            renderSection('ground', 103, 139);
            renderSection('order', 0, 2);
            document.getElementById('sec-quiz').innerHTML = `
                <div class="quiz-section">
                    <h2>${translations[currentLang].quizTitle}</h2>
                    <img id="quizImg" class="quiz-image" src="" style="display:none;">
                    <div id="quizOptions" class="options"></div>
                    <p id="quizFeedback" class="feedback"></p>
                    <button id="quizNext" class="next-btn" onclick="nextQuiz()">${translations[currentLang].next}</button>
                </div>`;
        }

        function updateInterface() {
            currentLang = document.getElementById('langSelect').value;
            document.getElementById('mainTitle').innerText = translations[currentLang].mainTitle;
            document.getElementById('footerText').innerText = translations[currentLang].footer;
            buildTabs();
            renderAllSections();
            switchTab(currentTab);
        }

        function startQuiz() {
            quizActive = true;
            quizIndex = Math.floor(Math.random() * allSigns.length);
            const q = allSigns[quizIndex];
            document.getElementById('quizImg').src = q.img;
            document.getElementById('quizImg').style.display = 'block';
            document.getElementById('quizFeedback').innerText = '';
            document.getElementById('quizNext').style.display = 'none';
            const correct = q[currentLang].t;
            let opts = [correct];
            while (opts.length < 3) {
                const r = allSigns[Math.floor(Math.random() * allSigns.length)][currentLang].t;
                if (!opts.includes(r)) opts.push(r);
            }
            opts.sort(() => Math.random() - 0.5);
            const container = document.getElementById('quizOptions');
            container.innerHTML = '';
            opts.forEach(opt => {
                const btn = document.createElement('button');
                btn.className = 'option-btn';
                btn.innerText = opt;
                btn.onclick = () => checkAnswer(btn, opt === correct);
                container.appendChild(btn);
            });
        }

        function checkAnswer(btn, isCorrect) {
            if (!quizActive) return;
            quizActive = false;
            const btns = document.querySelectorAll('#quizOptions .option-btn');
            btns.forEach(b => b.disabled = true);
            if (isCorrect) {
                btn.classList.add('correct');
                document.getElementById('quizFeedback').innerText = translations[currentLang].correct;
            } else {
                btn.classList.add('wrong');
                document.getElementById('quizFeedback').innerText = translations[currentLang].wrong;
                btns.forEach(b => {
                    if (b.innerText === allSigns[quizIndex][currentLang].t) b.classList.add('correct');
                });
            }
            document.getElementById('quizNext').style.display = 'inline-block';
        }

        function nextQuiz() {
            quizActive = true;
            startQuiz();
        }

        function changeLanguage() {
            updateInterface();
        }

        window.onload = updateInterface;
    </script>
