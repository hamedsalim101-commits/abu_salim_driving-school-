            --gold: #f1c40f;
            --bg: #f4f7f6;
            --success: #2ecc71;
            --danger: #e74c3c;
            --mandatory: #2980b9;
            --ground: #d35400;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: var(--bg);
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }
        .main-header {
            background: linear-gradient(135deg, #0f1c2e, #1e3a5f);
            color: white;
            padding: 1.2rem 2rem;
            box-shadow: 0 4px 20px rgba(0,0,0,0.3);
            position: sticky;
            top: 0;
            z-index: 100;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 1rem;
        }
        .logo-area { display: flex; align-items: center; gap: 15px; }
        .logo-icon {
            width: 65px; height: 65px;
            background: linear-gradient(145deg, #f1c40f, #f39c12);
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 32px; color: #1e3a5f;
            box-shadow: 0 0 20px rgba(241,196,15,0.5);
            border: 3px solid white;
        }
        .school-name h1 { font-size: 1.6rem; margin: 0; }
        .school-name .subtitle { color: #f1c40f; font-size: 0.9rem; font-weight: bold; }
        .lang-selector {
            padding: 8px 16px; border-radius: 20px;
            border: 2px solid rgba(255,255,255,0.4);
            background: rgba(255,255,255,0.15);
            color: white; font-weight: bold; font-size: 15px; cursor: pointer;
        }
        .lang-selector option { color: #1e3a5f; }
        .container { max-width: 1300px; margin: 25px auto; padding: 0 20px; flex: 1; }
        .tabs { display: flex; justify-content: center; flex-wrap: wrap; gap: 8px; margin-bottom: 25px; }
        .tab {
            padding: 10px 16px; border: none; border-radius: 30px;
            background: white; color: var(--primary); font-weight: bold; font-size: 14px;
            cursor: pointer; box-shadow: 0 3px 10px rgba(0,0,0,0.08);
            transition: 0.3s; border: 2px solid transparent;
            display: flex; align-items: center; gap: 5px;
        }
        .tab.active { background: var(--primary); color: white; transform: translateY(-2px); box-shadow: 0 6px 15px rgba(0,0,0,0.2); }
        .tab:hover { background: var(--primary); color: white; }
        .section { display: none; animation: fadeIn 0.4s; }
        .section.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .signs-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(210px, 1fr)); gap: 18px; margin-top: 15px; }
        .sign-card {
            background: white; border-radius: 14px; padding: 18px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.05); transition: 0.3s;
            display: flex; flex-direction: column; align-items: center;
            text-align: center; border: 2px solid #eee;
        }
        .sign-card:hover { transform: translateY(-6px); box-shadow: 0 12px 25px rgba(0,0,0,0.12); border-color: var(--gold); }
        .sign-card img { width: 90px; height: 90px; object-fit: contain; margin-bottom: 12px; }
        .sign-card h3 { color: #2c3e50; margin: 0 0 5px; font-size: 16px; }
        .sign-card .desc { color: #666; font-size: 13px; margin-bottom: 5px; }

        /* تنسيقات الاختبار */
        .quiz-section { background: white; border-radius: 18px; padding: 30px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); text-align: center; }
        .quiz-header {
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 20px; flex-wrap: wrap; gap: 10px;
        }
        .quiz-timer {
            font-size: 20px; font-weight: bold; color: var(--primary);
            background: #f0f4f8; padding: 8px 16px; border-radius: 25px;
        }
        .quiz-timer.warning { color: var(--danger); animation: blink 1s infinite; }
        @keyframes blink { 50% { opacity: 0.5; } }
        .quiz-progress { font-size: 18px; font-weight: bold; color: var(--primary); }
        .quiz-image { max-width: 200px; max-height: 200px; margin: 15px auto; display: block; border-radius: 12px; box-shadow: 0 5px 15px rgba(0,0,0,0.15); }
        .quiz-question-text {
            font-size: 20px; font-weight: bold; margin: 15px 0; color: #2c3e50;
            background: #f8f9fa; padding: 15px; border-radius: 10px;
        }
        .options { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; max-width: 600px; margin: 20px auto; }
        @media (max-width: 500px) { .options { grid-template-columns: 1fr; } }
        .option-btn {
            padding: 14px; border: 2px solid var(--primary);
            background: #f0f4f8; border-radius: 12px; font-size: 16px;
            font-weight: bold; cursor: pointer; transition: 0.2s; color: var(--primary);
        }
        .option-btn:hover { background: var(--primary); color: white; }
        .option-btn.correct { background: var(--success); color: white; border-color: var(--success); }
        .option-btn.wrong { background: var(--danger); color: white; border-color: var(--danger); }
        .feedback { font-size: 20px; font-weight: bold; margin: 10px 0; min-height: 30px; }
        .next-btn { background: var(--primary); color: white; border: none; padding: 12px 28px; border-radius: 25px; font-size: 16px; cursor: pointer; display: none; margin: 10px auto 0; }
        
        /* نتيجة الاختبار */
        .result-panel { text-align: center; padding: 30px; }
        .result-panel .score-circle {
            width: 150px; height: 150px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            margin: 20px auto; font-size: 40px; font-weight: bold;
            border: 8px solid;
        }
        .result-panel .pass { background: #d4edda; color: #155724; border-color: var(--success); }
        .result-panel .fail { background: #f8d7da; color: #721c24; border-color: var(--danger); }
        .restart-btn {
            background: var(--primary); color: white; border: none;
            padding: 12px 30px; border-radius: 25px; font-size: 18px;
            cursor: pointer; margin-top: 20px;
        }

        .footer-bar { background: var(--primary); color: white; text-align: center; padding: 18px; margin-top: 30px; }
        .whatsapp-float {

        // توليد خيارات متشابهة للإشارات لإجبار الطالب على التركيز
        function generateSimilarOptions(correctSign) {
            const lang = currentLang;
            const correct = correctSign[lang].t;
            
            // كلمات متشابهة للإشارات
            const similarPatterns = {
                ar: [
                    { key: "يمين", similar: ["يمين", "يميناً", "لليمين", "يميني"] },
                    { key: "يسار", similar: ["يسار", "يساراً", "لليسار", "يساري"] },
                    { key: "إجباري", similar: ["إجباري", "إلزامي", "وجوبي", "إلزام"] },
                    { key: "ممنوع", similar: ["ممنوع", "محظور", "ممنوعة", "حظر"] },
                    { key: "قف", similar: ["قف", "توقف", "قف تماماً", "الوقوف"] }
                ],
                en: [
                    { key: "Right", similar: ["Right", "Right Turn", "Turn Right", "Right Side"] },
                    { key: "Left", similar: ["Left", "Left Turn", "Turn Left", "Left Side"] },
                    { key: "No", similar: ["No", "Prohibited", "Not Allowed", "Banned"] }
                ],
                hi: [
                    { key: "दाएं", similar: ["दाएं", "दाईं ओर", "दाहिने", "दाएँ"] },
                    { key: "बाएं", similar: ["बाएं", "बाईं ओर", "बाएँ"] }
                ],
                ur: [
                    { key: "دائیں", similar: ["دائیں", "دائیں طرف", "دائیں جانب"] },
                    { key: "بائیں", similar: ["بائیں", "بائیں طرف", "بائیں جانب"] }
                ],
                bn: [
                    { key: "ডান", similar: ["ডান", "ডানদিকে", "ডান পাশে"] },
                    { key: "বাম", similar: ["বাম", "বামদিকে", "বাম পাশে"] }
                ]
            };

            let wrongOptions = [];
            const attempts = 100;
            
            for (let i = 0; i < attempts && wrongOptions.length < 3; i++) {
                const randomSign = allSigns[Math.floor(Math.random() * allSigns.length)];
                const wrongTitle = randomSign[lang].t;
                
                if (wrongTitle !== correct && !wrongOptions.includes(wrongTitle)) {
                    // تفضيل الخيارات المتشابهة
                    const patterns = similarPatterns[lang] || [];
                    let isSimilar = false;
                    
                    for (const pattern of patterns) {
                        if (correct.includes(pattern.key) && wrongTitle.includes(pattern.key)) {
                            isSimilar = true;
                            break;
                        }
                    }
                    
                    if (isSimilar || wrongOptions.length >= 2) {
                        wrongOptions.push(wrongTitle);
                    } else if (Math.random() < 0.3) {
                        wrongOptions.push(wrongTitle);
                    }
                }
            }
            
            // إذا لم نجد خيارات كافية
            while (wrongOptions.length < 3) {
                const randomSign = allSigns[Math.floor(Math.random() * allSigns.length)];
                const wrongTitle = randomSign[lang].t;
                if (wrongTitle !== correct && !wrongOptions.includes(wrongTitle)) {
                    wrongOptions.push(wrongTitle);
                }
            }
            
            return wrongOptions.slice(0, 3);
        }

        // بناء 15 سؤال للاختبار
        function buildQuiz() {
            quizQuestions = [];
            const lang = currentLang;
            
            // 10 أسئلة تعريف إشارات
            const shuffledSigns = [...allSigns].sort(() => Math.random() - 0.5);
            for (let i = 0; i < 10; i++) {
                const sign = shuffledSigns[i];
                const correct = sign[lang].t;
                const wrongOptions = generateSimilarOptions(sign);
                
                const options = [correct, ...wrongOptions].sort(() => Math.random() - 0.5);
                
                quizQuestions.push({
                    type: 'sign',
                    img: sign.img,
                    question: '',
                    options: options,
                    correct: correct
                });
            }
            
            // 3 أسئلة مواقف وحوادث
            const scenarios = scenarioQuestions[lang];
            const shuffledScenarios = [...scenarios].sort(() => Math.random() - 0.5);

                    question: shuffledScenarios[i].q,
                    options: shuffledScenarios[i].opts,

                });
            }
            
            // 2 سؤال كتابي
            const textQ = textQuestions[lang];
            const shuffledText = [...textQ].sort(() => Math.random() - 0.5);
            for (let i = 0; i < 2; i++) {
                quizQuestions.push({
                    type: 'text',
                    img: null,
                    question: shuffledText[i].q,
                    options: shuffledText[i].opts,
                    correct: shuffledText[i].opts[shuffledText[i].ans]
                });
            }
            
            // خلط الأسئلة
            quizQuestions.sort(() => Math.random() - 0.5);
        }

        // بدء الاختبار
        function startQuiz() {
            buildQuiz();
            currentQIndex = 0;
            score = 0;
            quizActive = true;
            timeLeft = 600;
            
            updateTimerDisplay();
            startTimer();
            showQuestion();
        }

        // عرض السؤال الحالي
        function showQuestion() {
            if (!quizActive || currentQIndex >= 15) {
                endQuiz();
                return;
            }
            
            const q = quizQuestions[currentQIndex];
            const t = translations[currentLang];
            
            document.getElementById('quizImg').style.display = q.img ? 'block' : 'none';
            if (q.img) document.getElementById('quizImg').src = q.img;
            
            document.getElementById('quizFeedback').innerText = '';
            document.getElementById('quizNext').style.display = 'none';
            
            document.getElementById('quizProgress').innerText = 
                `${t.question} ${currentQIndex + 1} ${t.of} 15`;
            
            const container = document.getElementById('quizOptions');
            
            if (q.type === 'text') {
                container.innerHTML = `<div class="quiz-question-text">${q.question}</div>`;
            } else if (q.type === 'scenario') {
                container.innerHTML = `<div class="quiz-question-text">${q.question}</div>`;
            } else {
                container.innerHTML = '';
            }
            
            q.options.forEach(opt => {
                const btn = document.createElement('button');
                btn.className = 'option-btn';
                btn.innerText = opt;
                btn.onclick = () => checkAnswer(btn, opt === q.correct);
                container.appendChild(btn);
            });
        }

        // التحقق من الإجابة
        function checkAnswer(btn, isCorrect) {
            if (!quizActive) return;
            
            const btns = document.querySelectorAll('#quizOptions .option-btn');
            btns.forEach(b => b.disabled = true);
            
            if (isCorrect) {
                btn.classList.add('correct');
                document.getElementById('quizFeedback').innerText = translations[currentLang].correct;
                score++;
            } else {
                btn.classList.add('wrong');
                document.getElementById('quizFeedback').innerText = translations[currentLang].wrong;
                btns.forEach(b => {
                    if (b.innerText === quizQuestions[currentQIndex].correct) {
                        b.classList.add('correct');
                    }
                });
            }
            
            document.getElementById('quizNext').style.display = 'inline-block';
        }

        // السؤال التالي
        function nextQuiz() {
            currentQIndex++;
            if (currentQIndex >= 15) {
                endQuiz();
            } else {
                showQuestion();
            }
                }
        
        // المؤقت
        function startTimer() {
            clearInterval(timerInterval);
            timerInterval = setInterval(() => {
                timeLeft--;
                updateTimerDisplay();
                
                if (timeLeft <= 60) {
                    document.getElementById('quizTimer').classList.add('warning');
                }
                
                if (timeLeft <= 0) {
                    clearInterval(timerInterval);
                    quizActive = false;
                    document.getElementById('quizFeedback').innerText = translations[currentLang].timeUp;
                    setTimeout(() => endQuiz(), 1500);
                }
            }, 1000);
        }

        function updateTimerDisplay() {
            const minutes = Math.floor(timeLeft / 60);
            const seconds = timeLeft % 60;
            document.getElementById('quizTimer').innerText = 
                `${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;
        }

        // إنهاء الاختبار
        function endQuiz() {
            clearInterval(timerInterval);
            quizActive = false;
            
            const t = translations[currentLang];
            const percentage = Math.round((score / 15) * 100);
            const passed = percentage >= 70;
            
            document.getElementById('quizTimer').classList.remove('warning');
            
            const container = document.getElementById('sec-quiz');
            container.innerHTML = `
                <div class="quiz-section">
                    <div class="result-panel">
                        <h2>${passed ? t.pass : t.fail}</h2>
                        <div class="score-circle ${passed ? 'pass' : 'fail'}">${percentage}%</div>
                        <p style="font-size:20px; margin:15px 0;">${t.score}: ${score} / 15</p>
                        <p style="font-size:16px; color:#666;">${t.correctAnswers}: ${score} ${t.of} 15</p>
                        <p style="font-size:14px; color:#888; margin-top:10px;">
                            ${passed ? '✅ ناجح - علامة النجاح 70%' : '❌ راسب - تحتاج 70% للنجاح'}
                        </p>
                        <button class="restart-btn" onclick="switchTab('quiz')">${t.restart}</button>
                    </div>
                </div>`;
        }

        // الأسئلة الكتابية
        const textQuestions = {
            ar: [
                { q: "ماذا تعني إشارة قف؟", opts: ["التوقف التام", "التوقف عند الحاجة", "تخفيف السرعة فقط", "المرور بحذر"], ans: 0 },
                { q: "متى يجب عليك إفساح الطريق؟", opts: ["عند وجود إشارة أفسح الطريق", "في جميع التقاطعات", "فقط في الدوارات", "فقط ليلاً"], ans: 0 },
                { q: "ما السرعة القصوى في المناطق السكنية؟", opts: ["40 كم/س", "60 كم/س", "80 كم/س", "120 كم/س"], ans: 0 },
                { q: "من له الأولوية في الدوار؟", opts: ["المركبة داخل الدوار", "المركبة خارج الدوار", "المركبة الأسرع", "المركبة الأكبر"], ans: 0 }
            ],
            en: [
                { q: "What does a Stop sign mean?", opts: ["Complete stop", "Stop if needed", "Slow down only", "Pass carefully"], ans: 0 },
                { q: "When should you give way?", opts: ["When there is a Give Way sign", "At all intersections", "Only at roundabouts", "Only at night"], ans: 0 },
                { q: "What is the speed limit in residential areas?", opts: ["40 km/h", "60 km/h", "80 km/h", "120 km/h"], ans: 0 },
                { q: "Who has priority in a roundabout?", opts: ["The vehicle inside", "The vehicle outside", "The faster vehicle", "The larger vehicle"], ans: 0 }
            ],
            hi: [
                { q: "स्टॉप चिन्ह का क्या अर्थ है?", opts: ["पूरी तरह रुकें", "ज़रूरत पड़ने पर रुकें", "केवल धीमा करें", "सावधानी से गुज़रें"], ans: 0 },
                { q: "रिहायशी इलाकों में गति सीमा क्या है?", opts: ["40 किमी/घंटा", "60 किमी/घंटा", "80 किमी/घंटा", "120 किमी/घंटा"], ans: 0 },
                { q: "गोल चक्कर में प्राथमिकता किसे है?", opts: ["अंदर का वाहन", "बाहर का वाहन", "तेज़ वाहन", "बड़ा वाहन"], ans: 0 },
                { q: "पीली बत्ती पर क्या करें?", opts: ["रुकने की तैयारी", "गति बढ़ाएं", "तेज़ी से गुज़रें", "पीछे जाएं"], ans: 0 }
            ],
            ur: [
                { q: "سٹاپ کے نشان کا کیا مطلب ہے؟", opts: ["مکمل رکیں", "ضرورت پڑنے پر رکیں", "صرف آہستہ کریں", "احتیاط سے گزریں"], ans: 0 },
                { q: "رہائشی علاقوں میں رفتار کی حد کیا ہے؟", opts: ["40 کلومیٹر فی گھنٹہ", "60 کلومیٹر فی گھنٹہ", "80 کلومیٹر فی گھنٹہ", "120 کلومیٹر فی گھنٹہ"], ans: 0 },
                { q: "گول چکر میں ترجیح کسے ہے؟", opts: ["اندر والی گاڑی", "باہر والی گاڑی", "تیز گاڑی", "بڑی گاڑی"], ans: 0 },
                { q: "پیلی بتی پر کیا کریں؟", opts: ["رکنے کی تیاری", "رفتار بڑھائیں", "تیزی سے گزریں", "پیچھے جائیں"], ans: 0 }
            ],
            bn: [
                { q: "স্টপ চিহ্নের অর্থ কী?", opts: ["সম্পূর্ণ থামুন", "প্রয়োজনে থামুন", "শুধু ধীরে চলুন", "সাবধানে যান"], ans: 0 },
                { q: "আবাসিক এলাকায় গতিসীমা কত?", opts: ["40 কিমি/ঘণ্টা", "60 কিমি/ঘণ্টা", "80 কিমি/ঘণ্টা", "120 কিমি/ঘণ্টা"], ans: 0 },
                { q: "গোলচত্বরে অগ্রাধিকার কার?", opts: ["ভেতরের গাড়ি", "বাইরের গাড়ি", "দ্রুত গাড়ি", "বড় গাড়ি"], ans: 0 },
                { q: "হলুদ বাতিতে কী করবেন?", opts: ["থামার প্রস্তুতি", "গতি বাড়ান", "তাড়াতাড়ি যান", "পিছনে যান"], ans: 0 }
            ]
        };
         // ==================== بقية الدوال ====================
        function buildTabs() {
            const container = document.getElementById('tabsContainer');
            const tabs = translations[currentLang].tabs;
            const keys = ['warning', 'prohibitory', 'mandatory', 'info', 'ground', 'order', 'quiz'];
            container.innerHTML = '';
            tabs.forEach((name, i) => {
                const btn = document.createElement('button');
                btn.className = 'tab' + (keys[i] === currentTab ? ' active' : '');
                btn.innerText = name;
                btn.onclick = () => switchTab(keys[i]);
                container.appendChild(btn);
            });
        }

        function switchTab(tabId) {
            currentTab = tabId;
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
            document.getElementById('sec-' + tabId).classList.add('active');
            buildTabs();
            if (tabId === 'quiz') {
                document.getElementById('sec-quiz').innerHTML = `
                    <div class="quiz-section">
                        <h2>${translations[currentLang].quizTitle}</h2>
                        <div class="quiz-header">
                            <span class="quiz-progress" id="quizProgress"></span>
                            <span class="quiz-timer" id="quizTimer">10:00</span>
                        </div>
                        <img id="quizImg" class="quiz-image" src="" style="display:none;">
                        <div id="quizOptions" class="options"></div>
                        <p id="quizFeedback" class="feedback"></p>
                        <button id="quizNext" class="next-btn" onclick="nextQuiz()">${translations[currentLang].next}</button>
                    </div>`;
                startQuiz();
            }
        }

        function renderSection(sectionId, startIdx, endIdx) {
            const container = document.getElementById('sec-' + sectionId);
            if (!container) return;
            const idx = ['warning','prohibitory','mandatory','info','ground','order','quiz'].indexOf(sectionId);
            let html = `<h2 style="text-align:center; margin-bottom:15px;">${translations[currentLang].tabs[idx]}</h2><div class="signs-grid">`;
            for (let i = startIdx; i < endIdx; i++) {
                if (i >= allSigns.length) break;
                const s = allSigns[i];
                const d = s[currentLang];
                html += `
                    <div class="sign-card">
                        <img src="${s.img}" alt="${d.t}" onerror="this.style.display='none'">
                        <h3>${d.t}</h3>
                        <p class="desc">${d.d}</p>
                    </div>`;
            }
            html += '</div>';
            container.innerHTML = html;
        }

        function renderAllSections() {
            renderSection('order', 0, 2);
            renderSection('warning', 2, 36);
            renderSection('prohibitory', 36, 61);
            renderSection('mandatory', 61, 73);
            renderSection('info', 73, 95);
            renderSection('ground', 103, 122);
            
            document.getElementById('sec-quiz').innerHTML = `
                <div class="quiz-section">
                    <h2>${translations[currentLang].quizTitle}</h2>
                    <p style="text-align:center;">انقر على زر الاختبار للبدء</p>
                </div>`;
        }

        function updateInterface() {
            currentLang = document.getElementById('langSelect').value;
            localStorage.setItem('drivingSchoolLang', currentLang);
            document.getElementById('mainTitle').innerText = translations[currentLang].mainTitle;
            document.getElementById('footerText').innerText = translations[currentLang].footer;
            buildTabs();
            renderAllSections();
            switchTab(currentTab);
        }

        function changeLanguage() {
            updateInterface();
        }

        // بدء التشغيل
        window.onload = () => {
            document.getElementById('langSelect').value = savedLang;
            updateInterface();
        };
    </script>
